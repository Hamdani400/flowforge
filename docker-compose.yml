version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: flowforge-postgres
    restart: always
    environment:
      POSTGRES_USER: flowforge
      POSTGRES_PASSWORD: flowforge
      POSTGRES_DB: flowforge
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: flowforge-redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  postgres_data:
